name: Haal GoatCounter stats op

on:
  schedule:
    - cron: '*/5 * * * *'  # elke 5 minuten
  workflow_dispatch:        # ook handmatig te starten

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GoatCounter stats
        run: |
          curl -s "https://aveltjen.goatcounter.com/counter/%2F.json" \
            -o stats.json

      - name: Commit stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          if git diff --staged --quiet; then
            echo "Geen wijziging, niets te committen."
          else
            git commit -m "Stats bijgewerkt"
            git pull --rebase
            git push
          fi
